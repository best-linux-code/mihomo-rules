name: Update geoip.dat

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh China IP list
        run: |
          curl --fail --location --silent --show-error \
            --output china_ip_list.txt \
            https://raw.githubusercontent.com/17mon/china_ip_list/master/china_ip_list.txt

      - name: Generate geoip.dat
        run: python3 generate_geoip.py generate

      - name: Inspect geoip.dat
        run: python3 generate_geoip.py inspect

      - name: Verify entry counts
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          provenance = json.loads(Path("PROVENANCE.json").read_text(encoding="utf-8"))
          counts = provenance["entry_counts"]
          cn_count = counts["CN"]
          private_count = counts["PRIVATE"]

          if cn_count < 5000:
              raise SystemExit(f"CN count below 5000: {cn_count}")
          if private_count != 21:
              raise SystemExit(f"PRIVATE count must be 21: {private_count}")
          PY

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify checksum
        run: sha256sum -c geoip.dat.sha256

      - name: Commit artifact changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add china_ip_list.txt geoip.dat geoip.dat.sha256 PROVENANCE.json
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "data: update geoip.dat"
            git push
          fi
